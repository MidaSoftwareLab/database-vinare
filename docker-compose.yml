version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: vinare-db-vector
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sommelier
    ports:
      - "5433:5432"
    volumes:
      - vinare_pgdata:/var/lib/postgresql/data

volumes:
  vinare_pgdata:
